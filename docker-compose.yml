services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: robotfleet
      POSTGRES_USER: robotfleet
      POSTGRES_PASSWORD: robotfleet
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U robotfleet"], interval: 5s, timeout: 5s, retries: 10 }
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://robotfleet:robotfleet@postgres:5432/robotfleet
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL: ws://localhost:8000/ws/fleet
    ports: ["5173:80"]
    depends_on: [backend]
  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes: [./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: [frontend, backend]
volumes: { postgres_data: {} }
